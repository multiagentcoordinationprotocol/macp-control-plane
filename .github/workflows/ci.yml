name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@multiagentcoordinationprotocol'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@multiagentcoordinationprotocol'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@multiagentcoordinationprotocol'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm test -- --coverage --passWithNoTests
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: macp_control_plane_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --tmpfs /var/lib/postgresql/data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@multiagentcoordinationprotocol'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/macp_control_plane_test
        run: npx ts-node src/db/migrate.ts
      - name: Run integration tests
        env:
          CI: true
          DATABASE_URL: postgres://postgres:postgres@localhost:5433/macp_control_plane_test
          NODE_ENV: development
          AUTH_API_KEYS: test-key-ci
          OTEL_ENABLED: false
          LOG_LEVEL: warn
          RUNTIME_ALLOW_INSECURE: true
          RUN_RECOVERY_ENABLED: false
          INTEGRATION_RUNTIME: mock
        run: npm run test:integration

  check-env-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets in tracked files
        run: |
          # Fail if any tracked file contains common secret patterns
          # (API keys, tokens, passwords in plain text)
          PATTERNS='(sk-proj-|sk-[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|password\s*=\s*["\x27][^"\x27]{8,})'
          if git ls-files | xargs grep -lPn "$PATTERNS" -- 2>/dev/null | grep -v '.env.example' | grep -v '.npmrc' | grep -v 'node_modules' | grep -v 'ci.yml'; then
            echo "::error::Potential secrets found in tracked files. Review the matches above."
            exit 1
          fi
          echo "No leaked secrets detected."

  conventions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce code conventions (see CLAUDE.md)
        run: |
          set -o pipefail
          fail=0

          echo "::group::throw new Error outside allowed files"
          if grep -rn "throw new Error" src --include='*.ts' | grep -vE '(app-config|migrate|\.spec\.ts|circuit-breaker\.ts|proto-registry\.service\.ts|grpc-helpers\.ts|run\.repository\.ts|webhook\.service\.ts|run-recovery\.service\.ts|runtime-jwt-minter\.service\.ts)'; then
            echo "::error::throw new Error found outside allowed files. Use AppException or a Nest built-in."
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::console.* outside migrate / specs"
          if grep -rn 'console\.' src --include='*.ts' | grep -vE '(migrate|\.spec\.ts)'; then
            echo "::error::console.* found outside migrate / tests. Use Nest Logger instead."
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::process.env outside allowed files"
          if grep -rn 'process\.env' src --include='*.ts' | grep -vE '(app-config|main\.ts|telemetry/telemetry\.ts|db/migrate\.ts|\.spec\.ts)'; then
            echo "::error::process.env read outside app-config/main/telemetry/migrate. Centralize in AppConfigService."
            fail=1
          fi
          echo "::endgroup::"

          echo "::group::Observer-only: no write-path endpoints reintroduced"
          if grep -rn 'POST.*runs/:id/\(messages\|signal\|context\)' src --include='*.ts' | grep -vE '(gone\(|\.spec\.ts|REMOVED|deprecated)'; then
            echo "::error::Write-path endpoint references found. Control-plane is observer-only (direct-agent-auth)."
            fail=1
          fi
          echo "::endgroup::"

          exit $fail

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, check-env-secrets, conventions]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@multiagentcoordinationprotocol'
      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NPM_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
